name: CI

on: [push, pull_request]

permissions:
    id-token: write

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: pnpm/action-setup@v5
              with:
                  run_install: false
            - uses: actions/setup-node@v6
              with:
                  node-version-file: '.nvmrc'
                  cache: 'pnpm'
            - run: pnpm install
            - run: pnpm build
            - uses: actions/cache/save@v5
              with:
                  key: build-${{ github.sha }}
                  path: |
                      packages/*/dist/**

    lint:
        runs-on: ubuntu-latest
        needs: build
        steps:
            - uses: actions/checkout@v6
            - uses: pnpm/action-setup@v5
              with:
                  run_install: false
            - uses: actions/setup-node@v6
              with:
                  node-version-file: '.nvmrc'
                  cache: 'pnpm'
            - uses: actions/cache/restore@v5
              with:
                  key: build-${{ github.sha }}
                  path: |
                      packages/*/dist/**
            - run: pnpm install
            - run: pnpm lint

    unit-tests:
        runs-on: ubuntu-latest
        needs: build
        steps:
            - uses: actions/checkout@v6
            - uses: pnpm/action-setup@v5
              with:
                  run_install: false
            - uses: actions/setup-node@v6
              with:
                  node-version-file: '.nvmrc'
                  cache: 'pnpm'
            - uses: actions/cache/restore@v5
              with:
                  key: build-${{ github.sha }}
                  path: |
                      packages/*/dist/**
            - run: pnpm install
            - run: pnpm test:ci

    e2e:
        runs-on: ubuntu-latest
        needs: build
        steps:
            - uses: actions/checkout@v6
            - uses: pnpm/action-setup@v5
              with:
                  run_install: false
            - uses: actions/setup-node@v6
              with:
                  node-version-file: '.nvmrc'
                  cache: 'pnpm'
            - uses: actions/cache/restore@v5
              with:
                  key: build-${{ github.sha }}
                  path: |
                      packages/*/dist/**
            - run: pnpm install
            - run: pnpm exec playwright install --with-deps
            - run: pnpm e2e:test
            - name: Upload Playwright report
              uses: actions/upload-artifact@v7
              if: ${{ failure() }}
              with:
                  name: playwright-report
                  path: playground/playwright-report

    verify:
        runs-on: ubuntu-latest
        needs: build
        steps:
            - uses: actions/checkout@v6
            - uses: pnpm/action-setup@v5
              with:
                  run_install: false
            - uses: actions/setup-node@v6
              with:
                  node-version-file: '.nvmrc'
                  cache: 'pnpm'
            - uses: actions/cache/restore@v5
              with:
                  key: build-${{ github.sha }}
                  path: |
                      packages/*/dist/**
            - run: pnpm install
            - run: pnpm verify

    publish:
        if: github.ref == 'refs/heads/main'
        runs-on: ubuntu-latest
        needs: [lint, unit-tests, e2e, verify]
        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0
            - uses: pnpm/action-setup@v5
              with:
                  run_install: false
            - uses: actions/setup-node@v6
              with:
                  node-version-file: '.nvmrc'
                  registry-url: 'https://registry.npmjs.org'
                  cache: 'pnpm'
            - uses: actions/cache/restore@v5
              with:
                  key: build-${{ github.sha }}
                  path: |
                      packages/*/dist/**
            - run: pnpm install
            - name: Publish updated packages
              run: pnpm exec noeldemartin-publish-modified-packages
