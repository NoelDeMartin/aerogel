name: Create Aerogel

on: [push, pull_request]

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    create-aerogel:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: pnpm/action-setup@v4
              with:
                  run_install: false
            - uses: voidzero-dev/setup-vp@v1
              with:
                  node-version-file: '.nvmrc'
                  cache: true
            - run: pnpm install
            - name: Build packages
              run: |
                  cd packages/cli
                  pnpm build
                  pnpm pack
                  cd ../../

                  cd packages/vite
                  pnpm build
                  pnpm pack
                  cd ../../

                  cd packages/core
                  pnpm build
                  pnpm pack
                  cd ../../

                  cd packages/plugin-i18n
                  pnpm build
                  pnpm pack
                  cd ../../

                  cd packages/plugin-routing
                  pnpm build
                  pnpm pack
                  cd ../../

                  cd packages/plugin-solid
                  pnpm build
                  pnpm pack
                  cd ../../

                  cd packages/plugin-local-first
                  pnpm build
                  pnpm pack
                  cd ../../
            - name: Create app
              run: |
                  git config --global user.email "john@example.com"
                  git config --global user.name "John Doe"
                  ./packages/cli/bin/gel create app --next --local --copy
                  cd app
                  vp install
            - run: vp build
              working-directory: app
            - run: vp check
              working-directory: app
            - run: vp run type-check
              working-directory: app
            - run: vp test
              working-directory: app
